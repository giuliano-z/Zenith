name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff==0.15.15
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zenith
          POSTGRES_USER: zenith
          POSTGRES_PASSWORD: zenith
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zenith"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings.development
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: zenith
      POSTGRES_USER: zenith
      POSTGRES_PASSWORD: zenith
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements/development.txt
      - run: python manage.py migrate
      - run: pytest

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install bandit==1.9.4
      - run: bandit -r apps config -ll
