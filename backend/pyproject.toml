[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "S", "UP"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101"]  # assert permitido en tests
"config/settings/*.py" = ["F403", "F405"]  # star imports intencionales en settings
